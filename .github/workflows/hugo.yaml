# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: |
          sudo apt-get update
          sudo apt-get install -y sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Hugo cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
            resources
          key: hugo-${{ hashFiles('**/*.md', 'hugo.toml') }}
          restore-keys: |
            hugo-
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Shanghai
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Verify build
        run: |
          echo "✓ Build completed successfully"
          echo "Generated files: $(find ./public -type f | wc -l)"
          echo "Public directory size: $(du -sh ./public | cut -f1)"
          echo ""
          echo "Top 10 largest files:"
          find ./public -type f -exec du -h {} + | sort -rh | head -10
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public
      - name: Notify on build failure
        if: failure()
        run: |
          echo "✗ Build failed!"
          echo "Please check the Hugo logs above for error details."
          echo ""
          echo "Common issues:"
          echo "  - Check for syntax errors in Markdown files"
          echo "  - Verify hugo.toml configuration"
          echo "  - Ensure all submodules are properly initialized"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Notify on deployment success
        if: success()
        run: |
          echo "✓ Deployment successful!"
          echo "Page URL: ${{ steps.deployment.outputs.page_url }}"
      - name: Notify on deployment failure
        if: failure()
        run: |
          echo "✗ Deployment failed!"
          echo "Please check the build logs for details."